{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Site oficial não-oficial dos San Antonio Spurs --times de basquete da NBA">
    <title>{% block title %}San Antonio Spurs{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spurs: {
                            silver: '#B6B6B4',
                            black: '#000000',
                            navy: '#06143B',
                            gray: '#63717A',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">
    
    {% include 'components/header.html' %}
    
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>
    
    {% include 'components/footer.html' %}
    
</body>
</html>
